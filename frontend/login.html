  <script>
    const API_BASE = "https://cdr-mvko.onrender.com";

    const loader = document.getElementById("loader");
    const loginBtn = document.getElementById("loginBtn");

    function showLoader() {
      loader.classList.remove("hidden");
      loginBtn.disabled = true;
      loginBtn.innerText = "Please wait...";
    }

    function hideLoader() {
      loader.classList.add("hidden");
      loginBtn.disabled = false;
      loginBtn.innerText = "LOGIN";
    }

    // 🔥 Warm-up backend (Render sleep fix)
    fetch(`${API_BASE}/api/health`).catch(() => {});

    async function loginUser(username, password, retries = 3) {
      showLoader();

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));

          alert("✅ Login Successful!");
          window.location.href = "index.html";
        } else {
          alert(data.error || "Login failed");
          hideLoader();
        }

      } catch (err) {
        if (retries > 0) {
          console.log(`Retrying... (${retries})`);
          setTimeout(() => loginUser(username, password, retries - 1), 3000);
        } else {
          alert("❌ Server slow hai (Render sleep). 30 sec baad try karo.");
          hideLoader();
        }
      }
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      loginUser(username, password);
    });
  </script>
