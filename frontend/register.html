<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDR Forensic - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #1f2937, #111827); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">
  <div class="w-full max-w-md p-8 bg-gray-900 rounded-3xl shadow-2xl border border-gray-700">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-red-500 tracking-widest">CDR FORENSIC</h1>
      <p class="text-gray-400 mt-2">New Investigator Registration</p>
    </div>

    <h2 class="text-2xl font-semibold text-center mb-6">Create Account</h2>

    <form id="registerForm" class="space-y-5">
      <div>
        <label class="block text-gray-400 text-sm mb-1">Full Name</label>
        <input type="text" id="fullName" 
               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-red-500 text-white">
      </div>

      <div>
        <label class="block text-gray-400 text-sm mb-1">Username <span class="text-red-500">*</span></label>
        <input type="text" id="username" required 
               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-red-500 text-white">
      </div>

      <div>
        <label class="block text-gray-400 text-sm mb-1">Email</label>
        <input type="email" id="email" 
               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-red-500 text-white">
      </div>

      <div>
        <label class="block text-gray-400 text-sm mb-1">Password <span class="text-red-500">*</span></label>
        <input type="password" id="password" required 
               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-red-500 text-white">
      </div>

      <button type="submit" 
              class="w-full py-4 bg-red-600 hover:bg-red-700 transition-all font-bold text-lg rounded-2xl">
        REGISTER
      </button>
    </form>

    <p class="text-center mt-6 text-gray-400">
      Already have an account? 
      <a href="login.html" class="text-red-500 hover:underline font-medium">Login Here</a>
    </p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;

      try {
        const res = await fetch('https://cdr-mvko.onrender.com/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, fullName, email })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Registration Successful! Ab Login karein.");
          window.location.href = "login.html";
        } else {
          alert(data.error || "Registration failed");
        }
      } catch (err) {
        alert("Backend se connect nahi ho raha hai.");
      }
    });
  </script>
</body>
</html>
